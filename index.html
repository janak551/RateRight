<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RateRight - Know Your Worth</title>
  <meta name="description" content="Free tool that tells freelancers exactly what to charge per hour. Enter your expenses, get your minimum, recommended and premium rate instantly. Works in 60+ currencies.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c3ce0;
      --primary-dark: #5a2dc5;
      --bg: #f8f7fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --green: #10b981;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      padding: 40px 0 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .card h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group small {
      display: block;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 3px;
    }

    input[type="number"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 60, 224, 0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn:hover { background: var(--primary-dark); }

    .results { display: none; }
    .results.show { display: block; }

    .rate-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    @media (max-width: 540px) {
      .rate-cards { grid-template-columns: 1fr; }
    }

    .rate-card {
      text-align: center;
      padding: 22px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
    }

    .rate-card.minimum { border-color: var(--orange); background: #fffbeb; }
    .rate-card.recommended { border-color: var(--green); background: #ecfdf5; transform: scale(1.03); }
    .rate-card.premium { border-color: var(--blue); background: #eff6ff; }

    .rate-card .label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .rate-card.minimum .label { color: var(--orange); }
    .rate-card.recommended .label { color: var(--green); }
    .rate-card.premium .label { color: var(--blue); }

    .rate-card .amount {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--text);
    }

    .rate-card .per-hour {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .breakdown {
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
    }

    .breakdown .line {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .breakdown .line.total {
      border-top: 1.5px solid var(--border);
      margin-top: 6px;
      padding-top: 10px;
      font-weight: 700;
      color: var(--text);
    }

    footer {
      text-align: center;
      padding: 32px 0 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>RateRight</h1>
      <p>Enter your monthly expenses and get your ideal freelance hourly rate instantly.</p>
    </header>

    <form id="calculator" class="card">
      <h2>Your Details</h2>

      <div class="row">
        <div class="form-group">
          <label for="currency">Currency</label>
          <select id="currency"></select>
        </div>
        <div class="form-group">
          <label for="hoursPerWeek">Billable hours / week</label>
          <input type="number" id="hoursPerWeek" value="30" min="1" max="80">
          <small>Hours you actually bill clients</small>
        </div>
      </div>

      <h2 style="margin-top: 24px;">Monthly Expenses</h2>

      <div class="row">
        <div class="form-group">
          <label for="rent">Rent / Housing</label>
          <input type="number" id="rent" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="food">Food / Groceries</label>
          <input type="number" id="food" placeholder="0" min="0">
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="transport">Transport</label>
          <input type="number" id="transport" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="utilities">Utilities & Internet</label>
          <input type="number" id="utilities" placeholder="0" min="0">
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="insurance">Insurance / Health</label>
          <input type="number" id="insurance" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="software">Software & Tools</label>
          <input type="number" id="software" placeholder="0" min="0">
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="savings">Savings Goal</label>
          <input type="number" id="savings" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="other">Other Expenses</label>
          <input type="number" id="other" placeholder="0" min="0">
        </div>
      </div>

      <div class="form-group">
        <label for="taxRate">Estimated Tax Rate (%)</label>
        <input type="number" id="taxRate" value="25" min="0" max="80">
      </div>

      <button type="submit" class="btn">Calculate My Rate</button>
    </form>

    <div class="results" id="results">
      <div class="card">
        <h2>Your Hourly Rates</h2>
        <div class="rate-cards">
          <div class="rate-card minimum">
            <div class="label">Minimum</div>
            <div class="amount" id="rateMin"></div>
            <div class="per-hour">per hour</div>
          </div>
          <div class="rate-card recommended">
            <div class="label">Recommended</div>
            <div class="amount" id="rateRec"></div>
            <div class="per-hour">per hour</div>
          </div>
          <div class="rate-card premium">
            <div class="label">Premium</div>
            <div class="amount" id="ratePrem"></div>
            <div class="per-hour">per hour</div>
          </div>
        </div>

        <div class="breakdown" id="breakdown"></div>
      </div>
    </div>

    <footer>
      RateRight &mdash; Know your worth.
    </footer>
  </div>

  <script>
    const currencies = [
      { code: 'USD', symbol: '$', name: 'US Dollar' },
      { code: 'EUR', symbol: '\u20AC', name: 'Euro' },
      { code: 'GBP', symbol: '\u00A3', name: 'British Pound' },
      { code: 'INR', symbol: '\u20B9', name: 'Indian Rupee' },
      { code: 'CAD', symbol: 'CA$', name: 'Canadian Dollar' },
      { code: 'AUD', symbol: 'A$', name: 'Australian Dollar' },
      { code: 'JPY', symbol: '\u00A5', name: 'Japanese Yen' },
      { code: 'CNY', symbol: '\u00A5', name: 'Chinese Yuan' },
      { code: 'CHF', symbol: 'CHF', name: 'Swiss Franc' },
      { code: 'SEK', symbol: 'kr', name: 'Swedish Krona' },
      { code: 'NOK', symbol: 'kr', name: 'Norwegian Krone' },
      { code: 'DKK', symbol: 'kr', name: 'Danish Krone' },
      { code: 'NZD', symbol: 'NZ$', name: 'New Zealand Dollar' },
      { code: 'SGD', symbol: 'S$', name: 'Singapore Dollar' },
      { code: 'HKD', symbol: 'HK$', name: 'Hong Kong Dollar' },
      { code: 'KRW', symbol: '\u20A9', name: 'South Korean Won' },
      { code: 'MXN', symbol: 'MX$', name: 'Mexican Peso' },
      { code: 'BRL', symbol: 'R$', name: 'Brazilian Real' },
      { code: 'ZAR', symbol: 'R', name: 'South African Rand' },
      { code: 'RUB', symbol: '\u20BD', name: 'Russian Ruble' },
      { code: 'TRY', symbol: '\u20BA', name: 'Turkish Lira' },
      { code: 'PLN', symbol: 'z\u0142', name: 'Polish Zloty' },
      { code: 'THB', symbol: '\u0E3F', name: 'Thai Baht' },
      { code: 'IDR', symbol: 'Rp', name: 'Indonesian Rupiah' },
      { code: 'MYR', symbol: 'RM', name: 'Malaysian Ringgit' },
      { code: 'PHP', symbol: '\u20B1', name: 'Philippine Peso' },
      { code: 'CZK', symbol: 'K\u010D', name: 'Czech Koruna' },
      { code: 'ILS', symbol: '\u20AA', name: 'Israeli Shekel' },
      { code: 'CLP', symbol: 'CL$', name: 'Chilean Peso' },
      { code: 'ARS', symbol: 'AR$', name: 'Argentine Peso' },
      { code: 'COP', symbol: 'CO$', name: 'Colombian Peso' },
      { code: 'PEN', symbol: 'S/', name: 'Peruvian Sol' },
      { code: 'EGP', symbol: 'E\u00A3', name: 'Egyptian Pound' },
      { code: 'NGN', symbol: '\u20A6', name: 'Nigerian Naira' },
      { code: 'KES', symbol: 'KSh', name: 'Kenyan Shilling' },
      { code: 'GHS', symbol: 'GH\u20B5', name: 'Ghanaian Cedi' },
      { code: 'PKR', symbol: '\u20A8', name: 'Pakistani Rupee' },
      { code: 'BDT', symbol: '\u09F3', name: 'Bangladeshi Taka' },
      { code: 'LKR', symbol: 'Rs', name: 'Sri Lankan Rupee' },
      { code: 'VND', symbol: '\u20AB', name: 'Vietnamese Dong' },
      { code: 'TWD', symbol: 'NT$', name: 'Taiwan Dollar' },
      { code: 'AED', symbol: 'AED', name: 'UAE Dirham' },
      { code: 'SAR', symbol: 'SAR', name: 'Saudi Riyal' },
      { code: 'QAR', symbol: 'QAR', name: 'Qatari Riyal' },
      { code: 'KWD', symbol: 'KWD', name: 'Kuwaiti Dinar' },
      { code: 'BHD', symbol: 'BHD', name: 'Bahraini Dinar' },
      { code: 'OMR', symbol: 'OMR', name: 'Omani Rial' },
      { code: 'JOD', symbol: 'JOD', name: 'Jordanian Dinar' },
      { code: 'HUF', symbol: 'Ft', name: 'Hungarian Forint' },
      { code: 'RON', symbol: 'lei', name: 'Romanian Leu' },
      { code: 'BGN', symbol: 'лв', name: 'Bulgarian Lev' },
      { code: 'HRK', symbol: 'kn', name: 'Croatian Kuna' },
      { code: 'UAH', symbol: '\u20B4', name: 'Ukrainian Hryvnia' },
      { code: 'ISK', symbol: 'kr', name: 'Icelandic Krona' },
      { code: 'MAD', symbol: 'MAD', name: 'Moroccan Dirham' },
      { code: 'TND', symbol: 'TND', name: 'Tunisian Dinar' },
      { code: 'GEL', symbol: '\u20BE', name: 'Georgian Lari' },
      { code: 'AMD', symbol: '\u058F', name: 'Armenian Dram' },
      { code: 'UZS', symbol: 'UZS', name: 'Uzbekistani Som' },
      { code: 'KZT', symbol: '\u20B8', name: 'Kazakhstani Tenge' },
      { code: 'RSD', symbol: 'din', name: 'Serbian Dinar' },
      { code: 'BAM', symbol: 'KM', name: 'Bosnia Mark' },
      { code: 'ETB', symbol: 'Br', name: 'Ethiopian Birr' },
      { code: 'UGX', symbol: 'USh', name: 'Ugandan Shilling' },
      { code: 'TZS', symbol: 'TSh', name: 'Tanzanian Shilling' },
    ];

    const sel = document.getElementById('currency');
    currencies.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.code;
      opt.textContent = c.symbol + ' - ' + c.code + ' (' + c.name + ')';
      sel.appendChild(opt);
    });

    function getSymbol() {
      const c = currencies.find(c => c.code === sel.value);
      return c ? c.symbol : '$';
    }

    function fmt(n) {
      const sym = getSymbol();
      return sym + Math.round(n).toLocaleString();
    }

    document.getElementById('calculator').addEventListener('submit', function(e) {
      e.preventDefault();

      const val = id => parseFloat(document.getElementById(id).value) || 0;

      const rent = val('rent');
      const food = val('food');
      const transport = val('transport');
      const utilities = val('utilities');
      const insurance = val('insurance');
      const software = val('software');
      const savings = val('savings');
      const other = val('other');
      const taxRate = val('taxRate') / 100;
      const hoursPerWeek = val('hoursPerWeek');

      const monthlyExpenses = rent + food + transport + utilities + insurance + software + savings + other;
      const annualExpenses = monthlyExpenses * 12;
      const weeksPerYear = 48; // accounting for 4 weeks off
      const billableHoursPerYear = hoursPerWeek * weeksPerYear;

      const preTaxAnnual = annualExpenses / (1 - taxRate);
      const minimumRate = preTaxAnnual / billableHoursPerYear;
      const recommendedRate = minimumRate * 1.3;
      const premiumRate = minimumRate * 1.75;

      document.getElementById('rateMin').textContent = fmt(minimumRate);
      document.getElementById('rateRec').textContent = fmt(recommendedRate);
      document.getElementById('ratePrem').textContent = fmt(premiumRate);

      const bd = document.getElementById('breakdown');
      bd.innerHTML =
        '<div class="line"><span>Monthly expenses</span><span>' + fmt(monthlyExpenses) + '</span></div>' +
        '<div class="line"><span>Annual expenses (x12)</span><span>' + fmt(annualExpenses) + '</span></div>' +
        '<div class="line"><span>After tax (' + Math.round(taxRate * 100) + '%)</span><span>' + fmt(preTaxAnnual) + ' /yr</span></div>' +
        '<div class="line"><span>Billable hours/year (' + hoursPerWeek + 'h x 48 wks)</span><span>' + billableHoursPerYear + ' hrs</span></div>' +
        '<div class="line total"><span>Minimum hourly rate</span><span>' + fmt(minimumRate) + '</span></div>';

      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    });
  </script>
</body>
</html>
